<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Download Lab · supporters</title>
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#0c0b10" />
<link rel="icon" type="image/png" href="/favicon.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/styles.css" />
</head>
<body>

<main class="card-screen">
  <div class="mini-card">
    <img class="mark" src="/favicon.png" alt="" width="46" height="46" />

    <div id="connect-view">
      <h1>Download Lab</h1>
      <p>Lab is delivered to Patreon supporters. Connect your account to verify your pledge and grab the latest build.</p>
      <div class="dl-grid">
        <a class="action" id="connect" style="justify-content:center" href="#">Connect with Patreon</a>
      </div>
      <p style="margin-top:1rem"><a href="/index.html">← Back to the site</a></p>
    </div>

    <div id="download-view" class="hidden">
      <h1>You're in 🎬</h1>
      <p id="who">Active supporter. Pick your platform.</p>
      <div class="dl-grid">
        <button data-os="macos">macOS · Apple Silicon &amp; Intel</button>
        <button data-os="windows">Windows · x64</button>
        <button data-os="linux">Linux · x86_64 AppImage</button>
      </div>
    </div>

    <div class="spinner hidden" id="spinner"></div>
    <p class="status-line" id="status"></p>
  </div>
</main>

<script>
// Gated download page. Runs the Patreon OAuth flow with redirect_uri =
// this page, exchanges the code via the broker worker (which holds the
// client_secret), then asks the worker for a short-lived signed link to
// the installer for the chosen OS, but only if the worker's live
// membership check passes. The access token lives only in this tab.
(function () {
  // The broker worker (lab repo: worker/), bound to broker.decoupled.cam.
  // It serves /exchange (OAuth code -> token) and /api/installer for this
  // page, plus the desktop app's updater routes.
  const BROKER = "https://broker.decoupled.cam";
  const CLIENT_ID = "IUDPbgWknc3QIgQ70dZmnx2k2EOJl6yGAXhxpWl5tvIk28cH469PXub7uqaEd3bN"; // same as the app + worker
  const REDIRECT = location.origin + "/download"; // must be allow-listed in Patreon + broker

  const connectView = document.getElementById("connect-view");
  const downloadView = document.getElementById("download-view");
  const connectBtn = document.getElementById("connect");
  const spinner = document.getElementById("spinner");
  const status = (m) => (document.getElementById("status").textContent = m || "");
  const busy = (on) => spinner.classList.toggle("hidden", !on);

  let accessToken = null;

  connectBtn.addEventListener("click", (e) => {
    e.preventDefault();
    const url =
      "https://www.patreon.com/oauth2/authorize?response_type=code" +
      "&client_id=" + encodeURIComponent(CLIENT_ID) +
      "&redirect_uri=" + encodeURIComponent(REDIRECT) +
      "&scope=" + encodeURIComponent("identity identity.memberships");
    location.href = url;
  });

  async function exchange(code) {
    const r = await fetch(BROKER + "/exchange", {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({ code, redirect_uri: REDIRECT }),
    });
    if (!r.ok) throw new Error("exchange failed (" + r.status + ")");
    const data = await r.json();
    if (!data.access_token) throw new Error("no access token returned");
    return data.access_token;
  }

  async function download(os) {
    if (!accessToken) { status("Connect your Patreon account first."); return; }
    busy(true); status("Checking your membership…");
    try {
      const r = await fetch(BROKER + "/api/installer?os=" + encodeURIComponent(os), {
        headers: { authorization: "Bearer " + accessToken },
      });
      if (r.status === 403) { busy(false); status("Your Patreon subscription doesn't include downloads right now."); return; }
      if (r.status === 401) { busy(false); status("Session expired. Reconnect with Patreon."); return; }
      if (!r.ok) { busy(false); status("Couldn't get a download link. Try again shortly."); return; }
      const { url, sha256 } = await r.json();
      location.href = url;
      // Surface the published SHA-256 so you can verify the installer
      // (Windows: certutil -hashfile <file> SHA256 · macOS/Linux: shasum -a 256 <file>).
      status(sha256 ? "Download starting. Verify SHA-256: " + sha256 : "Starting download…");
      setTimeout(() => busy(false), 1500);
    } catch (e) {
      console.error("installer request failed:", e);
      busy(false); status("Something went wrong. Try again.");
    }
  }

  document.querySelectorAll("#download-view button").forEach((b) =>
    b.addEventListener("click", () => download(b.dataset.os)));

  // On return from Patreon: exchange the code, then reveal the buttons.
  (async function init() {
    const params = new URLSearchParams(location.search);
    const code = params.get("code");
    const error = params.get("error");
    if (error) { status("Patreon sign-in was cancelled or failed."); return; }
    if (!code) return; // first visit, show the Connect button
    busy(true); status("Connecting…");
    try {
      accessToken = await exchange(code);
      history.replaceState({}, "", "/download");
      connectView.classList.add("hidden");
      downloadView.classList.remove("hidden");
      busy(false); status("");
    } catch (e) {
      console.error("patreon code exchange failed:", e);
      busy(false);
      status("Connection failed. Head back and try again.");
    }
  })();
})();
</script>
</body>
</html>
